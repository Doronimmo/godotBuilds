name: Check Releases Ubuntu 19.04
on: workflow_dispatch
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          path: builder_repo
      
      - name: Aggressive cleanup # Snatched this from some medium post
        run: |
          sudo rm -rf /usr/lib/jvm
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/share/swift
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf /usr/local/julia*
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/local/share/chromium
          sudo rm -rf /opt/microsoft /opt/google
          sudo rm -rf /opt/az
          sudo rm -rf /usr/local/share/powershell
          sudo rm -rf /opt/hostedtoolcache
          docker system prune -af || true
          docker builder prune -af || true
          df -h

      - env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sudo apt-get update
          sudo apt-get install -y squashfs-tools debootstrap qemu-user-static
          sudo mkdir -p /c
          sudo debootstrap --variant=minbase --arch=arm64 --foreign disco /c http://old-releases.ubuntu.com/ubuntu/
          sudo cp /usr/bin/qemu-aarch64-static /c/usr/bin/
          sudo chroot /c /debootstrap/debootstrap --second-stage
          cd builder_repo
          E=0
          for T in $(gh release list --repo $GITHUB_REPOSITORY --limit 100 | awk '{print $1}'); do
            gh release download "$T" --repo $GITHUB_REPOSITORY --pattern "*aarch64.squashfs" 2>/dev/null || continue
            S=$(ls *.squashfs 2>/dev/null)
            [ -z "$S" ] && continue
            unsquashfs -f -d ex "$S" >/dev/null 2>&1
            B=$(find ex -type f -executable | head -n 1)
            if [ -n "$B" ]; then
              sudo cp "$B" /c/b
              sudo chmod +x /c/b
              O=$(sudo chroot /c /usr/bin/qemu-aarch64-static /b --headless --version 2>&1)
              if echo "$O" | grep -qE "invalid option|Condition"; then
                O=$(sudo chroot /c /usr/bin/qemu-aarch64-static /b --version 2>&1)
              fi
              if echo "$O" | grep -qE "not found|shared libraries|Segmentation fault|core dumped"; then
                echo "FAIL $T"
                echo "$O"
                sudo chroot /c /usr/bin/qemu-aarch64-static /usr/bin/ldd /b || true
                E=1
              else
                echo "PASS $T"
              fi
            fi
            sudo rm -rf ex /c/b *.squashfs
          done
          exit $E
