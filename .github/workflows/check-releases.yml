name: Check Releases Ubuntu 19.04
on: workflow_dispatch
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sudo apt-get update
          sudo apt-get install -y squashfs-tools debootstrap qemu-user-static
          sudo mkdir -p /c
          sudo debootstrap --arch=arm64 --foreign disco /c http://old-releases.ubuntu.com/ubuntu/
          sudo cp /usr/bin/qemu-aarch64-static /c/usr/bin/
          sudo chroot /c /debootstrap/debootstrap --second-stage
          E=0
          for T in $(gh release list --limit 100 | awk '{print $1}'); do
            gh release download "$T" --pattern "*aarch64.squashfs" 2>/dev/null || continue
            S=$(ls *.squashfs 2>/dev/null)
            [ -z "$S" ] && continue
            unsquashfs -f -d ex "$S" >/dev/null 2>&1
            B=$(find ex -type f -executable | head -n 1)
            [ -n "$B" ] && sudo cp "$B" /c/b && sudo chmod +x /c/b
            if ! sudo chroot /c /usr/bin/qemu-aarch64-static /b --version >/dev/null 2>&1; then
              echo "FAIL $T"
              sudo chroot /c /usr/bin/qemu-aarch64-static /usr/bin/ldd /b || true
              E=1
            else
              echo "PASS $T"
            fi
            sudo rm -rf ex /c/b *.squashfs
          done
          exit $E
