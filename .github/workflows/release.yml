name: Build
on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Godot tag (eg. 4.6-stable) leave empty to rebuild all'
        required: false
        default: ''

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SCONS_CACHE_LIMIT: 7168
  BASE_BUILD_FLAGS: >
    disable_path_overrides=no
    optimize=speed
    production=yes
    lto=full
    use_static_cpp=yes
    use_llvm=yes
    linker=lld
    module_openxr_enabled=no
    vulkan=no
    module_mobile_vr_enabled=no
    module_webxr_enabled=no
#safe to assume no one will miss vr/vulkan modules on PM ;]

permissions:
  contents: write
  actions: write
  
jobs:
  dispatch_router:
    if: inputs.ref == ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Trigger workflows for all releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASES=$(gh release list --exclude-drafts | awk '{print $1}')
          
          if [ -z "$RELEASES" ]; then
            echo "No releases found to rebuild."
            exit 0
          fi
          
          for TAG in $RELEASES; do
            echo "Dispatching build for release: $TAG"
            gh workflow run "${{ github.workflow }}" -f ref="$TAG"
            sleep 2
          done

  build:
    if: inputs.ref != ''
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, aarch64]
        type: [release, debug, mono_release, mono_debug]
        include:
          - arch: x86_64
            scons_arch: x86_64
            deb_arch: amd64
            runner: ubuntu-latest

          - arch: aarch64
            scons_arch: arm64
            deb_arch: arm64
            runner: ubuntu-24.04-arm

          - type: release
            target: template_release
            middle: ""
            flags: ""
          - type: debug
            target: template_debug
            middle: "debug."
            flags: ""
          - type: mono_release
            target: template_release
            middle: "mono."
            flags: "module_mono_enabled=yes"
          - type: mono_debug
            target: template_debug
            middle: "mono.debug."
            flags: "module_mono_enabled=yes"
              
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Aggressive cleanup # Snatched this from some medium post
        run: |
          sudo rm -rf /usr/lib/jvm
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/share/swift
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf /usr/local/julia*
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/local/share/chromium
          sudo rm -rf /opt/microsoft /opt/google
          sudo rm -rf /opt/az
          sudo rm -rf /usr/local/share/powershell
          sudo rm -rf /opt/hostedtoolcache
          docker system prune -af || true
          docker builder prune -af || true
          df -h
      
      - run: sudo apt-get update && sudo apt-get install -y squashfs-tools debootstrap binfmt-support qemu-user-static debian-archive-keyring ubuntu-keyring
      
      - uses: actions/checkout@v6
        with:
          path: builder_repo
          
      - uses: actions/checkout@v6
        with:
          repository: godotengine/godot
          ref: '${{ inputs.ref }}'
          path: godot_source

      - uses: actions/setup-dotnet@v5
        if: contains(matrix.type, 'mono')
        with:
          dotnet-version: 8.0.100
        
      - uses: actions/cache@v5
        with:
          path: godot_source/.scons-cache
          key: scons-${{ matrix.arch }}-${{ matrix.type }}-${{ inputs.ref }}-${{ github.run_id }}
          restore-keys: scons-${{ matrix.arch }}-${{ matrix.type }}-

      - name: Cache Compiled Python
        id: cache-python
        uses: actions/cache@v5
        with:
          path: cached_python_311
          key: python-3.11-buster-${{ matrix.deb_arch }}

      - run: |
          sudo debootstrap --no-check-gpg --arch=${{ matrix.deb_arch }} buster /mnt/buster http://archive.debian.org/debian/
          
          for dir in dev dev/pts proc sys; do
            sudo mount -o bind /$dir /mnt/buster/$dir
          done
          
          sudo mkdir -p /mnt/buster/w
          sudo mount -o bind $PWD/godot_source /mnt/buster/w
          
          if [ -d "builder_repo/deps" ]; then
            sudo mkdir -p /mnt/buster/tmp/deps
            sudo cp -R builder_repo/deps/. /mnt/buster/tmp/deps/
          fi

          if [[ "${{ matrix.type }}" == mono_* ]]; then
            sudo mkdir -p /mnt/buster/usr/share/dotnet
            sudo mount -o bind "$DOTNET_ROOT" /mnt/buster/usr/share/dotnet
          fi
          
          if [ -d "cached_python_311/bin" ]; then
            sudo mkdir -p /mnt/buster/opt/python3.11
            sudo cp -a cached_python_311/* /mnt/buster/opt/python3.11/
          fi

      - run: |
          sudo chroot /mnt/buster /bin/bash -c "
            export DEBIAN_FRONTEND=noninteractive
            apt-get update && apt-get install -y --no-install-recommends wget gnupg ca-certificates
            
            wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | apt-key add -
            echo 'deb http://apt.llvm.org/buster/ llvm-toolchain-buster-11 main' >> /etc/apt/sources.list
            apt-get update
            
            apt-get install -y --no-install-recommends \
              build-essential pkg-config clang-11 lld-11 libx11-dev libxcursor-dev libxinerama-dev \
              libgl1-mesa-dev libglu-dev libasound2-dev libpulse-dev libudev-dev \
              libxi-dev libxrandr-dev wayland-protocols libwayland-dev libxkbcommon-dev libwayland-bin
            
            update-alternatives --install /usr/bin/clang clang /usr/bin/clang-11 100
            update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-11 100
            update-alternatives --install /usr/bin/ld.lld ld.lld /usr/bin/lld-11 100

            if [ ! -f \"/opt/python3.11/bin/python3\" ]; then
                apt-get install -y wget zlib1g-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev libsqlite3-dev
                wget https://www.python.org/ftp/python/3.11.9/Python-3.11.9.tgz
                tar -xf Python-3.11.9.tgz
                cd Python-3.11.9
                ./configure --prefix=/opt/python3.11
                make -j$(nproc)
                make install
                cd /w
                rm -rf /Python-3.11.9*
            fi
            
            PYTHONHOME=/opt/python3.11 /opt/python3.11/bin/python3 -m ensurepip --upgrade || true
            PYTHONHOME=/opt/python3.11 /opt/python3.11/bin/python3 -m pip install --upgrade pip
            PYTHONHOME=/opt/python3.11 /opt/python3.11/bin/python3 -m pip install scons
            rm -rf /tmp/deps
          "

      - if: steps.cache-python.outputs.cache-hit != 'true'
        run: |
          mkdir -p cached_python_311
          sudo cp -a /mnt/buster/opt/python3.11/* cached_python_311/
          sudo chown -R $USER:$USER cached_python_311

      - run: |
          sudo chroot /mnt/buster /bin/bash -c "
            cd /w
            
            if [[ \"${{ matrix.type }}\" == mono_* ]]; then
              export DOTNET_ROOT=/usr/share/dotnet
              export PATH=\"/usr/share/dotnet:/root/.local/bin:\${PATH}\"
            fi
            
            export PYTHONHOME=/opt/python3.11
            
            PYTHONHOME=/opt/python3.11 /opt/python3.11/bin/scons -j$(nproc) \
              cache_path=/w/.scons-cache \
              platform=linuxbsd \
              arch=${{ matrix.scons_arch }} \
              target=${{ matrix.target }} \
              ${BASE_BUILD_FLAGS} \
              ${{ matrix.flags }}
          "

      - run: |
          sudo chown -R $USER:$USER godot_source/bin
          sudo chown -R $USER:$USER godot_source/.scons-cache
          
          cd godot_source/bin
          VERSION="${{ inputs.ref }}"
          VERSION="${VERSION%-stable}"
          SHORTVER="${VERSION//./}"
          SUFFIX="${{ matrix.arch }}"
          [ "$SUFFIX" = "arm64" ] && SUFFIX="aarch64"
          
          BIN_NAME="godot${SHORTVER}.${{ matrix.middle }}${SUFFIX}"
          ORIG_BIN=$(ls godot.linuxbsd.${{ matrix.target }}.${{ matrix.scons_arch }}*)
          
          if [[ "${{ matrix.type }}" == *debug ]]; then
              strip "$ORIG_BIN"
          fi
          mv "$ORIG_BIN" "$BIN_NAME"
          chmod 777 "$BIN_NAME"
          
          mksquashfs "$BIN_NAME" \
            "godot_${VERSION}.${{ matrix.middle }}${SUFFIX}.squashfs" \
            -noappend \
            -comp gzip \
            >/dev/null
          
          cat <<EOF > flags_${{ matrix.type }}_${{ matrix.arch }}.md
          ### SCons Flags: ${{ matrix.type }} (${{ matrix.arch }})
          \`\`\`bash
          platform=linuxbsd arch=${{ matrix.scons_arch }} target=${{ matrix.target }} ${BASE_BUILD_FLAGS} ${{ matrix.flags }}
          \`\`\`
          EOF
          
      - uses: actions/upload-artifact@v7
        with:
          name: artifact-${{ matrix.type }}-${{ matrix.arch }}
          path: |
            godot_source/bin/*.squashfs
            godot_source/bin/flags_*.md

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - uses: actions/download-artifact@v7
        with:
          path: release_assets
          merge-multiple: true
        
      - run: cat release_assets/flags_*.md > notes.md
      
      - env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ inputs.ref }}" --title "${{ inputs.ref }}" --notes-file notes.md || true
          gh release edit "${{ inputs.ref }}" --notes-file notes.md
          gh release upload "${{ inputs.ref }}" release_assets/*.squashfs --clobber
          