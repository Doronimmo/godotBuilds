name: Build
on:
  workflow_dispatch:
    inputs:
      ref:
        required: true
        default: '4.6-stable'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SCONS_CACHE_LIMIT: 7168

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            scons_arch: x86_64
            runner: ubuntu-latest
            type: compat
            prefix: ""
            flags: "deprecated=yes minizip=yes disable_exceptions=yes \
              disable_rtti=yes module_basis_universal_enabled=yes \
              module_msdfgen_enabled=yes module_svg_enabled=yes \
              module_text_server_advanced_enabled=yes module_gltf_enabled=no \
              module_gridmap_enabled=no module_openxr_enabled=no \
              module_raycast_enabled=no module_lightmapper_rd_enabled=no"
          - arch: x86_64
            scons_arch: x86_64
            runner: ubuntu-latest
            type: optimised
            prefix: "optimised_"
            flags: "deprecated=no minizip=yes disable_3d=yes \
              disable_advanced_gui=yes disable_exceptions=yes \
              disable_rtti=yes module_basis_universal_enabled=yes \
              module_text_server_fallback_enabled=yes \
              module_text_server_advanced_enabled=no module_gltf_enabled=no \
              module_gridmap_enabled=no module_msdfgen_enabled=no \
              module_openxr_enabled=no module_raycast_enabled=no \
              module_svg_enabled=no module_lightmapper_rd_enabled=no"
          - arch: aarch64
            scons_arch: arm64
            runner: ubuntu-24.04-arm
            type: compat
            prefix: ""
            flags: "deprecated=yes minizip=yes disable_exceptions=yes \
              disable_rtti=yes module_basis_universal_enabled=yes \
              module_msdfgen_enabled=yes module_svg_enabled=yes \
              module_text_server_advanced_enabled=yes module_gltf_enabled=no \
              module_gridmap_enabled=no module_openxr_enabled=no \
              module_raycast_enabled=no module_lightmapper_rd_enabled=no"
          - arch: aarch64
            scons_arch: arm64
            runner: ubuntu-24.04-arm
            type: optimised
            prefix: "optimised_"
            flags: "deprecated=no minizip=yes disable_3d=yes \
              disable_advanced_gui=yes disable_exceptions=yes \
              disable_rtti=yes module_basis_universal_enabled=yes \
              module_text_server_fallback_enabled=yes \
              module_text_server_advanced_enabled=no module_gltf_enabled=no \
              module_gridmap_enabled=no module_msdfgen_enabled=no \
              module_openxr_enabled=no module_raycast_enabled=no \
              module_svg_enabled=no module_lightmapper_rd_enabled=no"
    runs-on: ${{ matrix.runner }}
    steps:
      - run: sudo apt-get update && sudo apt-get install -y squashfs-tools
      
      - uses: actions/checkout@v5
        with:
          path: builder_repo
        
      - uses: actions/checkout@v5
        with:
          repository: godotengine/godot
          ref: '${{ inputs.ref }}'
          path: godot_source
        
      - uses: actions/cache@v4
        with:
          path: godot_source/.scons-cache
          key: scons-${{ matrix.arch }}-${{ matrix.type }}-${{ inputs.ref }}-${{ github.run_id }}
          restore-keys: scons-${{ matrix.arch }}-${{ matrix.type }}-
          
      - run: docker build --build-arg ARCH=${{ matrix.arch }} -f builder_repo/.github/Dockerfile -t local-builder builder_repo
      
      - run: |
          cd godot_source
          docker run --rm \
            -v "$PWD":/w \
            -w /w \
            --user $(id -u):$(id -g) \
            local-builder \
            scons -j$(nproc) \
            cache_path=/w/.scons-cache \
            platform=linuxbsd \
            arch=${{ matrix.scons_arch }} \
            target=template_release \
            optimize=speed \
            production=yes \
            lto=full \
            use_static_cpp=yes \
            ${{ matrix.flags }}
          
          cd bin
          VERSION="${{ inputs.ref }}"
          VERSION="${VERSION%-stable}"
          SHORTVER="${VERSION//./}"
          SUFFIX="${{ matrix.arch }}"
          [ "$SUFFIX" = "arm64" ] && SUFFIX="aarch64"
          
          BIN_NAME="${{ matrix.prefix }}godot${SHORTVER}.${SUFFIX}"
          ORIG_BIN=$(ls godot.linuxbsd.template_release.${{ matrix.scons_arch }}*)
          
          strip "$ORIG_BIN" \
            && mv "$ORIG_BIN" "$BIN_NAME" \
            && chmod 777 "$BIN_NAME"
          
          mksquashfs "$BIN_NAME" \
            "godot_${VERSION}.${{ matrix.prefix }}${SUFFIX}.squashfs" \
            -noappend \
            -comp zstd \
            >/dev/null
          
          cat <<EOF > flags_${{ matrix.type }}_${{ matrix.arch }}.md
          ### SCons Flags: ${{ matrix.type }} (${{ matrix.arch }})
          \`\`\`bash
          platform=linuxbsd arch=${{ matrix.scons_arch }} target=template_release \\
          optimize=speed production=yes lto=full use_static_cpp=yes \\
          ${{ matrix.flags }}
          \`\`\`
          EOF
          
      - uses: actions/upload-artifact@v4
        with:
          name: artifact-${{ matrix.type }}-${{ matrix.arch }}
          path: |
            godot_source/bin/*.squashfs
            godot_source/bin/flags_*.md

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release_assets
          merge-multiple: true
        
      - run: cat release_assets/flags_*.md > notes.md
      
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.ref }}
          body_path: notes.md
          files: release_assets/*.squashfs