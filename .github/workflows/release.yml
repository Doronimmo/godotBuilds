name: Build
on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Godot tag (eg. 4.6-stable) leave empty to rebuild all'
        required: false
        default: ''

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SCONS_CACHE_LIMIT: 7168
  BASE_BUILD_FLAGS: >
    disable_path_overrides=no
    optimize=speed
    production=yes
    use_static_cpp=yes
    module_openxr_enabled=no
    vulkan=no
    module_mobile_vr_enabled=no
    module_webxr_enabled=no
  #safe to assume no one will miss vr/vulkan modules on PM ;]

permissions:
  contents: write
  actions: write
  
jobs:
  dispatch_router:
    if: inputs.ref == ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Trigger workflows for all releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASES=$(gh release list --exclude-drafts | awk '{print $1}')
          
          if [ -z "$RELEASES" ]; then
            echo "No releases found to rebuild."
            exit 0
          fi
          
          for TAG in $RELEASES; do
            echo "Dispatching build for release: $TAG"
            gh workflow run "${{ github.workflow }}" -f ref="$TAG"
            sleep 2
          done
  build:
    if: inputs.ref != ''
    strategy:
      fail-fast: false
      matrix:
        arch: [x86_64, aarch64]
        type: [release, debug, mono_release, mono_debug]
        include:
          - arch: x86_64
            scons_arch: x86_64
            runner: ubuntu-latest
            zig_target: x86_64-linux-gnu.2.28
            docker_env: ""
            scons_cmd: "scons"

          - arch: aarch64
            scons_arch: arm64
            runner: ubuntu-24.04-arm
            zig_target: aarch64-linux-gnu.2.28
            docker_env: "-e PYTHONHOME=/opt/python3.11"
            scons_cmd: "/opt/python3.11/bin/scons"

          - type: release
            target: template_release
            middle: ""
            flags: "lto=full"
          - type: debug
            target: template_debug
            middle: "debug."
            flags: "lto=none"
          - type: mono_release
            target: template_release
            middle: "mono."
            flags: "lto=full module_mono_enabled=yes"
          - type: mono_debug
            target: template_debug
            middle: "mono.debug."
            flags: "lto=none module_mono_enabled=yes"
              
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Aggressive cleanup # Snatched this from some medium post
        run: |
          sudo rm -rf /usr/lib/jvm
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/share/swift
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf /usr/local/julia*
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/local/share/chromium
          sudo rm -rf /opt/microsoft /opt/google
          sudo rm -rf /opt/az
          sudo rm -rf /usr/local/share/powershell
          sudo rm -rf /opt/hostedtoolcache
          docker system prune -af || true
          docker builder prune -af || true

          sudo swapoff -a || true
          sudo dd if=/dev/zero of=/swapfile bs=1M count=12288
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          
          df -h

      - run: sudo apt-get update && sudo apt-get install -y squashfs-tools xz-utils
      
      - uses: actions/checkout@v6
        with:
          path: builder_repo
      
      - if: matrix.arch == 'aarch64'
        run: |
          unsquashfs -d builder_repo/deps/python3.11 builder_repo/deps/python_3.11.aarch64.squashfs
        
      - uses: actions/checkout@v6
        with:
          repository: godotengine/godot
          ref: '${{ inputs.ref }}'
          path: godot_source
      
      - name: Download and Setup Zig Compiler for GLIBC Downgrade
        run: |
          cd godot_source
          wget -q https://ziglang.org/download/0.16.0/zig-${{ matrix.arch }}-linux-0.16.0.tar.xz
          tar -xf zig-${{ matrix.arch }}-linux-0.16.0.tar.xz
          mv zig-${{ matrix.arch }}-linux-0.16.0 zig_bin
        
      - uses: actions/setup-dotnet@v5
        if: contains(matrix.type, 'mono')
        with:
          dotnet-version: 8.0.100
        
      - uses: actions/cache@v5
        with:
          path: godot_source/.scons-cache
          key: scons-${{ matrix.arch }}-${{ matrix.type }}-${{ inputs.ref }}-${{ github.run_id }}
          restore-keys: scons-${{ matrix.arch }}-${{ matrix.type }}-

      - run: |
          mkdir -p builder_repo/dotnet
          if [[ "${{ matrix.type }}" == mono_* ]]; then
            cp -R "$DOTNET_ROOT"/* builder_repo/dotnet/
          fi
          touch builder_repo/dotnet/.gitkeep
          
      - run: docker build --build-arg ARCH=${{ matrix.arch }} -f builder_repo/.github/Dockerfile -t local-builder builder_repo
            
      - run: |
          cd godot_source
          mkdir -p zig_wrappers
          echo '#!/usr/bin/env bash' > zig_wrappers/clang
          echo 'env ZIG_LOCAL_CACHE_DIR=/w/.zig-cache ZIG_GLOBAL_CACHE_DIR=/w/.zig-global-cache /w/zig_bin/zig cc "$@"' >> zig_wrappers/clang
          echo '#!/usr/bin/env bash' > zig_wrappers/clang++
          echo 'env ZIG_LOCAL_CACHE_DIR=/w/.zig-cache ZIG_GLOBAL_CACHE_DIR=/w/.zig-global-cache /w/zig_bin/zig c++ "$@"' >> zig_wrappers/clang++
          echo '#!/usr/bin/env bash' > zig_wrappers/ar
          echo '/w/zig_bin/zig ar "$@"' >> zig_wrappers/ar
          echo '#!/usr/bin/env bash' > zig_wrappers/ranlib
          echo '/w/zig_bin/zig ranlib "$@"' >> zig_wrappers/ranlib
          chmod +x zig_wrappers/clang zig_wrappers/clang++ zig_wrappers/ar zig_wrappers/ranlib
          docker run --rm \
            -v "$PWD":/w \
            -w /w \
            -e HOME=/tmp \
            -e PATH="/w/zig_wrappers:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin" \
            --user $(id -u):$(id -g) \
            ${{ matrix.docker_env }} \
            local-builder \
            ${{ matrix.scons_cmd }} -j$(nproc) \
            CC="/w/zig_wrappers/clang" \
            CXX="/w/zig_wrappers/clang++" \
            cache_path=/w/.scons-cache \
            platform=linuxbsd \
            arch=${{ matrix.scons_arch }} \
            target=${{ matrix.target }} \
            extra_cflags="-target ${{ matrix.zig_target }}" \
            extra_cxxflags="-target ${{ matrix.zig_target }}" \
            ${BASE_BUILD_FLAGS} \
            ${{ matrix.flags }}
          
          cd bin
          VERSION="${{ inputs.ref }}"
          VERSION="${VERSION%-stable}"
          SHORTVER="${VERSION//./}"
          SUFFIX="${{ matrix.arch }}"
          [ "$SUFFIX" = "arm64" ] && SUFFIX="aarch64"
          
          BIN_NAME="godot${SHORTVER}.${{ matrix.middle }}${SUFFIX}"
          ORIG_BIN=$(ls godot.linuxbsd.${{ matrix.target }}.${{ matrix.scons_arch }}*)
          
          strip "$ORIG_BIN" \
            && mv "$ORIG_BIN" "$BIN_NAME" \
            && chmod 777 "$BIN_NAME"
          
          mksquashfs "$BIN_NAME" \
            "godot_${VERSION}.${{ matrix.middle }}${SUFFIX}.squashfs" \
            -noappend \
            -comp gzip \
            >/dev/null
          
          cat <<EOF > flags_${{ matrix.type }}_${{ matrix.arch }}.md
          ### SCons Flags: ${{ matrix.type }} (${{ matrix.arch }})
          \`\`\`bash
          platform=linuxbsd arch=${{ matrix.scons_arch }} target=${{ matrix.target }} ${BASE_BUILD_FLAGS} ${{ matrix.flags }}
          \`\`\`
          EOF
          
      - uses: actions/upload-artifact@v7
        with:
          name: artifact-${{ matrix.type }}-${{ matrix.arch }}
          path: |
            godot_source/bin/*.squashfs
            godot_source/bin/flags_*.md

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - uses: actions/download-artifact@v7
        with:
          path: release_assets
          merge-multiple: true
        
      - run: cat release_assets/flags_*.md > notes.md
      
      - env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ inputs.ref }}" --title "${{ inputs.ref }}" --notes-file notes.md || true
          gh release edit "${{ inputs.ref }}" --notes-file notes.md
          gh release upload "${{ inputs.ref }}" release_assets/*.squashfs --clobber
